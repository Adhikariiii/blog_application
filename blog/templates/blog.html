{% extends 'base.html' %} {% block content %}
<main>
  <h1 class="display-6 fw-bold text-center text-wrap">
    {{ blog.category }} News
  </h1>
  <div class="container py-4">
    <div class="p-5 mb-4 bg-body-tertiary rounded-3">
      <div class="container text-center">
        <div class="row row-cols-2">
          <div class="container-fluid py-5">
            <h1 class="display-6 fw-bold text-start text-wrap">
              {{ blog.title }}
            </h1>
            <p class="col-md-8 fs-5 text-center text-wrap">
              {{ blog.blog_body }}
            </p>
          </div>
          <div class="col">
            <img
              src="{{blog.featured_image.url}}"
              alt="{{blog.created_at}}"
              class="img-thumbnail"
            />
          </div>
        </div>
      </div>
    </div>

    <div class="row align-items-md-stretch">
      <div class="col-md-6">
        <div class="h-100 p-5 bg-body-tertiary border rounded-3">
          <h2>Author : {{blog.author}}</h2>
          <p>Upload : {{blog.created_at | timesince}}</p>
        </div>
      </div>
    </div>
  </div>
</main>
{% endblock %}
